<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        body {
            margin: 0;
        }
        #butA {
            width: 80px;
            height: 50px;
            border-radius: 50px;
            background-color: rgba(166, 250, 82, 0.797);
        }

        #butB {
            width: 80px;
            height: 50px;
            border-radius: 50px;
            background-color: rgba(251, 60, 60, 0.825);
        }

    </style>
<body>
    <canvas id="tutorial" width="960" height="768" ></canvas>
    <button id="butA" >BT A</button>
    <button id="butB"> BT B</button>

    <script>
        const canvas = document.getElementById('tutorial')
        var ctx = canvas.getContext('2d')

        const BotaoA = document.getElementById('butA')
        const BotaoB = document.getElementById('butB')

        const qtdLinha = 20
        const qtdColuna = 16
        const tamanho = 48
        let numero = 0
        var meuArray = []
        
        var playerPos = 0
        var npcPos = 308

        var mapaGrid = new Map()

        for(let xColuna = 0; xColuna < qtdColuna; xColuna++) {
            meuArray[xColuna] = []

                for(let yLinha = 0; yLinha < qtdLinha; yLinha++) {
                    const x = yLinha * tamanho
                    const y = xColuna * tamanho

                    ctx.font = '18px serif'
                    ctx.textAlign = 'center'
                    ctx.textBaseline = 'middle'

                    ctx.fillStyle = 'black'
                    ctx.strokeRect(x, y, tamanho, tamanho)
                    ctx.fillText(numero, x + tamanho/2, y + tamanho/2)

                    meuArray[xColuna][yLinha] = {position: numero, type: 0, g: 0, h: 0, f: 0, parent: null, x: x, y: y, indexX: xColuna, indexY: yLinha}
                    mapaGrid.set(numero, meuArray[xColuna][yLinha])

                    if(meuArray[xColuna][yLinha].position === playerPos) {
                        meuArray[xColuna][yLinha].type = 3

                        ctx.fillStyle = 'red'
                        ctx.fillRect(x, y, tamanho, tamanho)     
                        ctx.fillStyle = 'black'     
                        ctx.fillText(numero, x + tamanho/2, y + tamanho/2)              
                    }

                    if(meuArray[xColuna][yLinha].position === npcPos) {
                        meuArray[xColuna][yLinha].type = 4

                        ctx.fillStyle = 'blue'
                        ctx.fillRect(x, y, tamanho, tamanho)  
                        ctx.fillStyle = 'black'     
                        ctx.fillText(numero, x + tamanho/2, y + tamanho/2)         
                    }

                    numero++
                }
        }

        console.log(meuArray)
        console.log(mapaGrid)

        canvas.addEventListener("click", (e) => {
            let posicaox = Math.floor(e.y / tamanho)
            let posicaoy = Math.floor(e.x / tamanho)

            let x = posicaoy * tamanho
            let y = posicaox * tamanho
            
            if(meuArray[posicaox][posicaoy].type === 0) {
                meuArray[posicaox][posicaoy].type = 1
                
                ctx.fillStyle = 'rgba(145, 145, 145, 0.80)'
                ctx.fillRect(x, y, tamanho, tamanho)  
                ctx.strokeRect(x, y, tamanho, tamanho) 

                ctx.fillStyle = 'red'
                ctx.fillText(meuArray[posicaox][posicaoy].position, x + tamanho/2, y + tamanho/2)
            }
            
            else {
                meuArray[posicaox][posicaoy].type = 0 

                ctx.fillStyle = 'white'
                ctx.fillRect(x, y, tamanho, tamanho)  

                ctx.fillStyle = 'black'
                ctx.strokeRect(x, y, tamanho, tamanho)
                ctx.fillText(meuArray[posicaox][posicaoy].position, x + tamanho/2, y + tamanho/2)
            }
        })        

        let inicio = mapaGrid.get(npcPos)
        let fim = mapaGrid.get(playerPos)

        console.log(inicio)
        a_star(inicio, fim)

        function a_star(start, end) {

            let listaAberta = [start]
            let listaFechada = []
            let celulaAtual = listaAberta[0]

            start.g = 0
            start.h = distancia(start, end)
            start.f = start.g + start.h
            start.parent = null

            while (listaAberta.length > 0)
            {
                let melhorIndex = 0
                for(let index = 0; index < listaAberta.length; index++) {
                    if (listaAberta[melhorIndex].f > listaAberta[index].f) {
                        // menor f
                        melhorIndex = index
                        celulaAtual = listaAberta[melhorIndex]
                    }
                }

                if (celulaAtual === end)
                {
                   // console.log("Chegamos... Sucesso!")
                    break
                }

                listaFechada.push(listaAberta[melhorIndex])
                listaAberta.splice(melhorIndex, 1)


               // logica da vizinhaça
            
               let vizinhos = new Array(8)
               vizinhos[0] = mapaGrid.get(celulaAtual.position + 1)
               vizinhos[1] = mapaGrid.get(celulaAtual.position - 1) 
               vizinhos[2] = mapaGrid.get(celulaAtual.position - 20) 
               vizinhos[3] = mapaGrid.get(celulaAtual.position + 20)
               vizinhos[4] = mapaGrid.get(celulaAtual.position - 19)  
               vizinhos[5] = mapaGrid.get(celulaAtual.position + 21) 
               vizinhos[6] = mapaGrid.get(celulaAtual.position - 21) 
               vizinhos[7] = mapaGrid.get(celulaAtual.position + 19)      
               
                for (let index = 0; index < vizinhos.length; index++) {
                    const element = vizinhos[index];

                    if (!element) continue;

                    if (listaFechada.includes(element)) continue;

                    let custoG = celulaAtual.g + distancia(celulaAtual, vizinhos[index])

                    if (!listaAberta.includes(element))
                    {
                        listaAberta.push(element)
                    } else if (custoG >= element.g) {
                        continue
                    }

                    vizinhos[index].parent = celulaAtual
                    vizinhos[index].g = custoG
                    vizinhos[index].h = distancia(vizinhos[index], end)
                    vizinhos[index].f = vizinhos[index].g + vizinhos[index].h

                ctx.fillStyle = 'rgba(145, 145, 145, 0.50)'
                ctx.fillRect(element.x, element.y, 48, 48)

                }

               // direita = atual + 1
               // esquerda = atual - 1
               // cima = atual - 20
               // baixo = atual + 20
               // direita-cima = atual - 19
               // direita-baixo = atual + 21
               // esquerda-cima = atual - 21
               // esquerda-baixa = atual + 19

            }

            path = []
            while (celulaAtual != null) {
                path.push(celulaAtual)
                celulaAtual = celulaAtual.parent
            }

            path.reverse()

            path.forEach((value) => {

                //console.log(value.x, value.y)
                ctx.fillStyle = 'rgba(145, 145, 145, 0.50)'
                ctx.fillRect(value.x, value.y, 48, 48)
            })


            //console.log(path)

        }

        function distancia(start, end) {
            let deltaX = Math.abs(start.x - end.x)
            let deltaY = Math.abs(start.y - end.y)

            var distancia = Math.max(deltaX, deltaY) + (Math.SQRT2 - 1) * Math.min(deltaX, deltaY)

            return distancia
        }


    </script>
</body>
</html>
